[[redirects]]
  from = "/sitemap.xml"
  to = "https://downzilla-backend.onrender.com/extra/sitemap"
  status = 200
  force = true

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/robots.txt"
  to = "https://downzilla-backend.onrender.com/extra/robots.txt"
  status = 200
  force = true

[redirects.headers]
    X-Content-Type-Options = "nosniff"
    Content-Type = "application/xml; charset=utf-8"


[[redirects]]
from = "/*"
to = "/index.html"
status = 200