[[headers]]
for = "/sitemap.xml"

  [headers.values]
  Content-Type = "application/xml; charset=utf-8"
  X-Content-Type-Options = "nosniff"

[[headers]]
for = "/robots.txt"

  [headers.values]
  Content-Type = "text/plain; charset=utf-8"

[[headers]]
for = "/llms.txt"

  [headers.values]
  Content-Type = "text/plain; charset=utf-8"

[[redirects]]
from = "/sitemap.xml"
to = "/sitemap.xml"
status = 200
force = true

[[redirects]]
from = "/robots.txt"
to = "/robots.txt"
status = 200
force = true

[[redirects]]
from = "/llms.txt"
to = "/llms.txt"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[redirects]]
from = "/faq"
to = "/faq"
status = 200
force = true

[[redirects]]
from = "/docs"
to = "/docs"
status = 200
force = true

[[redirects]]
from = "/features"
to = "/features"
status = 200
force = true

[[redirects]]
from = "/supported-sites"
to = "/supported-sites"
status = 200
force = true
