[[headers]]
for = "/sitemap.xml"

  [headers.values]
  Content-Type = "application/xml; charset=utf-8"
  X-Content-Type-Options = "nosniff"

[[headers]]
for = "/robots.txt"

  [headers.values]
  Content-Type = "text/plain; charset=utf-8"

[[headers]]
for = "/llms.txt"

  [headers.values]
  Content-Type = "text/plain; charset=utf-8"

[[headers]]
for = "/faq"

  [headers.values]
  Content-Type = "text/plain; charset=utf-8"

[[headers]]
for = "/docs"

  [headers.values]
  Content-Type = "text/plain; charset=utf-8"

[[headers]]
for = "/features"

  [headers.values]
  Content-Type = "text/plain; charset=utf-8"

[[headers]]
for = "/supported-sites"

  [headers.values]
  Content-Type = "text/plain; charset=utf-8"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
