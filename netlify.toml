[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Access-Control-Allow-Origin = "*"
    

[redirects.headers]
    X-Content-Type-Options = "nosniff"
    Content-Type = "application/xml; charset=utf-8"


[[redirects]]
from = "/*"
to = "/index.html"
status = 200
